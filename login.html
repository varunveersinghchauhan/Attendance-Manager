<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Attendance Manager</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)),
        url('soft-color-background-abstract-blurred-motion-in-bright-colors-2023532941.jpg') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #5a67d8;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #4c51bf;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login to Continue</h2>
    <input type="text" id="name" placeholder="Your Name" required />
    <input type="email" id="email" placeholder="Your Email" required />
    <button onclick="login()">Login</button>
  </div>

  <script>
    async function login() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) {
        alert('Please enter your name and email.');
        return;
      }

      // Save lead (login details) to backend
      await fetch('http://localhost:5000/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, timestamp: new Date().toISOString() })
      });

      // Store locally & redirect
      localStorage.setItem('user', JSON.stringify({ name, email }));
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
